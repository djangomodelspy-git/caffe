{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — Kovur Grand</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    min-height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    position: relative; overflow: hidden;
    background: #071a0c;
  }

  /* BG gradient layers */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 70% 60% at 15% 10%, rgba(212,175,55,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 85% 85%, rgba(34,120,56,0.25) 0%, transparent 65%);
  }
  /* subtle grid */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  /* floating orbs */
  .orb { position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; animation: orb-float ease-in-out infinite; }
  .orb-1 { width:300px; height:300px; background:rgba(212,175,55,0.07); top:-100px; left:-100px; animation-duration:14s; }
  .orb-2 { width:220px; height:220px; background:rgba(34,120,56,0.18); bottom:-80px; right:-80px; animation-duration:11s; animation-delay:2s; }
  @keyframes orb-float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-22px) scale(1.04);} }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 10;
    width: 100%; max-width: 380px;
    background: linear-gradient(160deg, rgba(12,32,16,0.96) 0%, rgba(7,20,10,0.99) 100%);
    border-radius: 28px;
    border: 1px solid rgba(212,175,55,0.22);
    box-shadow:
      0 0 0 1px rgba(212,175,55,0.07),
      0 8px 32px rgba(0,0,0,0.55),
      0 40px 90px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(212,175,55,0.1);
    overflow: hidden;
  }

  /* Top gold accent bar */
  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #b8962e 20%, #f0d060 50%, #b8962e 80%, transparent 100%);
  }

  .card-inner { padding: 36px 30px 30px; }

  /* ── LOGO ── */
  .logo-area { text-align: center; margin-bottom: 26px; }
  .logo-area img {
    height: 115px; width: auto; display: inline-block;
    /* KEY FIX: removes the dark green box, only gold content shows */
    mix-blend-mode: lighten;
    filter:
      drop-shadow(0 0 24px rgba(212,175,55,0.55))
      drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .logo-sub {
    font-size: 10px; letter-spacing: 3.5px; text-transform: uppercase;
    color: rgba(212,175,55,0.4); margin-top: 4px; font-weight: 600;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 10px; margin-bottom: 22px;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
  }
  .divider span {
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
    color: rgba(212,175,55,0.4); text-transform: uppercase; white-space: nowrap;
  }

  /* ── ERROR ── */
  .error-box {
    display: flex; align-items: center; gap: 8px;
    background: rgba(239,68,68,0.09); border: 1px solid rgba(239,68,68,0.28);
    color: #fca5a5; padding: 11px 14px; border-radius: 12px;
    font-size: 13px; margin-bottom: 18px; line-height: 1.4;
  }
  .error-box svg { flex-shrink:0; width:15px; height:15px; }

  /* ── FORM ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700;
    color: rgba(212,175,55,0.55); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 7px;
  }
  .field-inner { position: relative; }
  .field-inner svg.f-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: rgba(212,175,55,0.4);
    pointer-events: none; transition: color 0.2s;
  }
  .field-inner:focus-within svg.f-icon { color: rgba(212,175,55,0.8); }

  .field-inner input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,175,55,0.16);
    color: #f0e8c8;
    padding: 14px 14px 14px 44px;
    border-radius: 13px; font-size: 15px; outline: none;
    transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
    -webkit-appearance: none;
  }
  .field-inner input::placeholder { color: rgba(212,175,55,0.2); font-size:14px; }
  .field-inner input:focus {
    border-color: rgba(212,175,55,0.55);
    background: rgba(212,175,55,0.055);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.09), 0 2px 10px rgba(0,0,0,0.35);
  }

  /* ── BUTTON ── */
  .btn-submit {
    width: 100%; margin-top: 6px;
    background: linear-gradient(135deg, #b8962e 0%, #e8c84a 45%, #b8962e 100%);
    background-size: 200% auto;
    color: #071a0c;
    border: none; padding: 15px 20px;
    border-radius: 14px;
    font-size: 15px; font-weight: 800;
    cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: background-position 0.5s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(212,175,55,0.38), inset 0 1px 0 rgba(255,255,255,0.15);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-submit svg { width:17px; height:17px; }
  .btn-submit:hover { background-position: right center; box-shadow: 0 6px 32px rgba(212,175,55,0.52); }
  .btn-submit:active { transform: scale(0.975); }

  /* ── FOOTER ── */
  .footer {
    text-align: center; margin-top: 20px;
    font-size: 11px; color: rgba(212,175,55,0.28); letter-spacing: 0.3px;
  }
  .footer strong { color: rgba(212,175,55,0.48); font-weight: 600; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="top-bar"></div>
  <div class="card-inner">

    <!-- LOGO — mix-blend-mode:lighten removes dark bg box -->
    <div class="logo-area">
      <img src="{% static 'caffe/cafe.png' %}" alt="Kovur Grand">
      <div class="logo-sub">Billing System</div>
    </div>

    <!-- DIVIDER -->
    <div class="divider"><span>Sign In to Continue</span></div>

    <!-- ERROR -->
    {% if error %}
    <div class="error-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <circle cx="12" cy="16" r="0.5" fill="currentColor"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'caffe_login' %}">
      {% csrf_token %}

      <!-- USERNAME -->
      <div class="field">
        <label for="uid">Username</label>
        <div class="field-inner">
          <svg class="f-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="uid" name="username"
                 placeholder="Enter username"
                 autofocus autocomplete="username" required>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label for="pwd">Password</label>
        <div class="field-inner">
          <svg class="f-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="pwd" name="password"
                 placeholder="Enter password"
                 autocomplete="current-password" required>
        </div>
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="btn-submit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Login
      </button>
    </form>

    <div class="footer">Powered by <strong>PS Digital Solutions</strong></div>

  </div>
</div>

</body>
</html>
