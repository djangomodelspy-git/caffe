<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cafe POS — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #22263a;
    --accent: #f97316; --text: #f1f5f9; --muted: #94a3b8;
    --border: #2e3347; --red: #ef4444;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100dvh; display: flex;
    align-items: center; justify-content: center;
    padding: 20px;
  }

  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 28px;
    width: 100%; max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .logo {
    text-align: center; margin-bottom: 28px;
  }
  .logo .icon { font-size: 40px; margin-bottom: 8px; }
  .logo h1 { font-size: 22px; font-weight: 800; }
  .logo h1 span { color: var(--accent); }
  .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .form-group {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
  }
  .form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 12px 14px; border-radius: 10px;
    font-size: 15px; outline: none; width: 100%;
  }
  .form-group input:focus { border-color: var(--accent); }

  .btn-login {
    width: 100%; background: var(--accent); color: #fff;
    border: none; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    margin-top: 6px; letter-spacing: 0.3px;
  }
  .btn-login:active { opacity: 0.85; }

  .error-msg {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: var(--red); padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 14px; text-align: center;
  }

  .footer-note {
    text-align: center; font-size: 12px; color: var(--muted); margin-top: 20px;
  }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <div class="icon">☕</div>
    <h1>Narasimha <span>Cafe</span></h1>
    <p>Sign in to continue</p>
  </div>

  {% if error %}
  <div class="error-msg">❌ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'caffe_login' %}">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Login →</button>
  </form>

  <div class="footer-note">Cafe Billing System · PS Digital Solutions</div>
</div>

</body>
</html>
